name: Deploy Backend

on:
  push:
    branches:
      - main  # Change this if you're using a different branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 128.199.102.244 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
              ssh -o StrictHostKeyChecking=no shotlin@128.199.102.244 "
              cd /home/shotlin/ShotlinBackend &&
              git pull &&
              npm install &&
              pm2 restart 0
              "
